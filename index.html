// ── 유틸 ──
function sh(s){let h=0,t="ef26"+s+"ef26";for(let i=0;i<t.length;i++){h=((h<<5)-h)+t.charCodeAt(i);h|=0;}return Math.abs(h).toString(36).padStart(10,"0");}
function shP(s){let h=0,t="efpw"+s+"efpw";for(let i=0;i<t.length;i++){h=((h<<5)-h)+t.charCodeAt(i);h|=0;}return Math.abs(h).toString(36).padStart(16,"0");}
function mp(p){const d=p.replace(/\D/g,"");return d.slice(0,3)+"-****-"+d.slice(-4);}
function fp(v){const d=v.replace(/\D/g,"").slice(0,11);if(d.length<4)return d;if(d.length<8)return d.slice(0,3)+"-"+d.slice(3);return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7);}
function fpr(n){return n.toLocaleString("ko-KR")+"원";}
function fd(s){if(!s)return"-";const d=new Date(s);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function gid(){const d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+Math.floor(1000+Math.random()*9000);}
function ps(p){let s=0;if(p.length>=6)s++;if(p.length>=10)s++;if(/[0-9]/.test(p))s++;if(/[!@#$%^&*]/.test(p))s++;return s;}
function ri(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const ratio=Math.min(1,800/img.width),w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(null,c.toDataURL("image/jpeg",.75));};img.onerror=e2=>cb(e2);img.src=e.target.result;};r.onerror=e=>cb(e);r.readAsDataURL(file);}

function mapMember(r){return{phoneHash:r.phone_hash,phoneMasked:r.phone_masked,name:r.name,passwordHash:r.password_hash,createdAt:r.created_at};}
function mapOrder(r){return{orderId:r.order_id,phoneHash:r.phone_hash,phoneMasked:r.phone_masked,items:r.items||[],total:r.total,depositor:r.depositor,shipping:r.shipping||{},status:r.status,createdAt:r.created_at,orderedAt:r.ordered_at,paidAt:r.paid_at,preparingAt:r.preparing_at,shippingAt:r.shipping_at,deliveredAt:r.delivered_at,cancelledAt:r.cancelled_at,deliveryPhoto:r.delivery_photo,cs:r.cs||[]};}

async function getMember(hash){try{const{data}=await sb.from("members").select("*").eq("phone_hash",hash).maybeSingle();return data?mapMember(data):null;}catch{return null;}}
async function saveMember(m){await sb.from("members").upsert({phone_hash:m.phoneHash,phone_masked:m.phoneMasked,name:m.name,password_hash:m.passwordHash,created_at:m.createdAt});}
async function getMyOrders(hash){const{data}=await sb.from("orders").select("*").eq("phone_hash",hash).order("created_at",{ascending:false});return(data||[]).map(mapOrder);}
async function getAllOrders(){const{data}=await sb.from("orders").select("*").order("created_at",{ascending:false});return(data||[]).map(mapOrder);}
async function insertOrder(o){await sb.from("orders").insert({order_id:o.orderId,phone_hash:o.phoneHash,phone_masked:o.phoneMasked,items:o.items,total:o.total,depositor:o.depositor,shipping:o.shipping,status:o.status,created_at:o.createdAt,ordered_at:o.orderedAt,cs:[]});}
async function patchOrder(id,patch){
  const d={};
  if(patch.status!==undefined)d.status=patch.status;
  if(patch.paidAt!==undefined)d.paid_at=patch.paidAt;
  if(patch.preparingAt!==undefined)d.preparing_at=patch.preparingAt;
  if(patch.shippingAt!==undefined)d.shipping_at=patch.shippingAt;
  if(patch.deliveredAt!==undefined)d.delivered_at=patch.deliveredAt;
  if(patch.cancelledAt!==undefined)d.cancelled_at=patch.cancelledAt;
  if(patch.deliveryPhoto!==undefined)d.delivery_photo=patch.deliveryPhoto;
  if(patch.cs!==undefined)d.cs=patch.cs;
  await sb.from("orders").update(d).eq("order_id",id);
}
async function getStockSetting(){const{data}=await sb.from("stock_settings").select("*");if(!data||!data.length)return DS;const r={};data.forEach(x=>{r[x.product_id]={total:x.total,perPerson:x.per_person};});return r;}
async function saveStockSetting(st){const rows=Object.entries(st).map(([pid,c])=>({product_id:pid,total:c.total,per_person:c.perPerson}));await sb.from("stock_settings").upsert(rows);}
async function calcStk(pid,myHash){
  const[cfg_all,{data:ords}]=await Promise.all([getStockSetting(),sb.from("orders").select("phone_hash,items,status").in("status",CF)]);
  const cfg=cfg_all[pid]||{total:20,perPerson:2};
  let ut=0,mu=0;
  for(const o of(ords||[])){if(!o.items)continue;for(const it of o.items){if(it.id!==pid)continue;ut+=it.qty;if(o.phone_hash===myHash)mu+=it.qty;}}
  const rt=Math.max(0,cfg.total-ut),rm=Math.max(0,cfg.perPerson-mu);
  return{total:cfg.total,perPerson:cfg.perPerson,usedTotal:ut,remainTotal:rt,myUsed:mu,remainMy:rm,canBuy:Math.min(rt,rm)};
}

        <div style={{display:"flex",gap:7}}>
          <button onClick={load} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:9,padding:"8px 10px",color:W,fontSize:16}}>🔄</button>
          <button onClick={onOut} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:9,padding:"8px 12px",color:W,fontSize:12,fontWeight:600}}>로그아웃</button>
        </div>
      </div>
    </header>
    <main style={{padding:"0 14px"}}>
      {tab==="dash"&&<SDash st={st} ords={ords} loading={loading} onSel={o=>{setSel(o);setTab("ords");}}/>}
      {tab==="ords"&&<SOrds disp={disp} flt={flt} setFlt={setFlt} onSel={setSel} loading={loading}/>}
      {tab==="stock"&&<SStock/>}
    </main>
    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+BD,display:"grid",gridTemplateColumns:"repeat(3,1fr)",padding:"6px 0 10px"}}>
      {[{k:"dash",e:"📊",l:"대시보드"},{k:"ords",e:"📦",l:"주문관리"},{k:"stock",e:"⚙️",l:"재고설정"}].map(({k,e,l})=>(
        <button key={k} onClick={()=>setTab(k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",padding:"5px 0"}}>
          <span style={{fontSize:20}}>{e}</span><span style={{fontSize:10,color:tab===k?B:GR,fontWeight:tab===k?700:400}}>{l}</span>
        </button>
      ))}
    </nav>
    {sel&&<SDetail order={sel} onClose={()=>setSel(null)} onUpd={upd}/>}
  </div>);
}

function SDash({st,ords,loading,onSel}){
  if(loading)return <Spin/>;
  const urg=ords.filter(o=>o.status==="pending_payment");
  return(<div style={{paddingTop:16}}>
    <div style={{background:"linear-gradient(135deg,"+B+","+BL+")",borderRadius:18,padding:"20px 18px",marginBottom:14,color:W}}><div style={{fontSize:12,color:"rgba(255,255,255,.7)",marginBottom:3}}>입금확인 기준 총 매출</div><div style={{fontSize:28,fontWeight:700}}>{fpr(st.rev)}</div><div style={{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:4}}>총 {st.total}건 주문</div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginBottom:18}}>
      {[{l:"입금대기",v:st.pending,bg:"#FEF3C7",t:"#92400E",d:"#F59E0B"},{l:"배송준비",v:st.paid,bg:"#EDE9FE",t:"#4C1D95",d:"#8B5CF6"},{l:"배송중",v:st.ship,bg:"#DBEAFE",t:"#1E40AF",d:"#3B82F6"},{l:"배송완료",v:st.done,bg:"#DCFCE7",t:"#166534",d:"#10B981"},{l:"예약구매",v:st.res,bg:"#FEF9C3",t:"#713F12",d:"#D97706"},{l:"전체",v:st.total,bg:CD,t:BL,d:B}].map(s=>(
        <div key={s.l} style={{background:s.bg,borderRadius:14,padding:"12px 10px"}}><div style={{display:"flex",alignItems:"center",gap:4,marginBottom:5}}><div style={{width:6,height:6,borderRadius:"50%",background:s.d}}/><span style={{fontSize:10,color:s.t,fontWeight:600}}>{s.l}</span></div><div style={{fontSize:22,fontWeight:700,color:s.t}}>{s.v}</div></div>
      ))}
    </div>
    {urg.length>0?(<div>
      <div style={{fontSize:13,fontWeight:700,color:"#92400E",marginBottom:10}}>⚠️ 입금 확인 필요 ({urg.length}건)</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:20}}>
        {urg.slice(0,5).map(o=>(
          <button key={o.orderId} onClick={()=>onSel(o)} style={{background:W,borderRadius:13,border:"1.5px solid #FDE68A",padding:"13px 14px",textAlign:"left",width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{fontSize:13,fontWeight:700}}>{o.items[0].name}</div><div style={{fontSize:11,color:GR,marginTop:2}}>입금자: {o.depositor} · {fd(o.createdAt)}</div></div>
            <span style={{fontSize:13,fontWeight:700,color:OR}}>{fpr(o.total)}</span>
          </button>
        ))}
      </div>
    </div>):<div style={{textAlign:"center",padding:"28px 0",color:GR}}><div style={{fontSize:32,marginBottom:7}}>✅</div><div style={{fontSize:14}}>처리 대기 주문이 없어요 👍</div></div>}
  </div>);
}

function SOrds({disp,flt,setFlt,onSel,loading}){
  const filters=["all","pending_payment","payment_confirmed","preparing","shipping","delivered","reserved","cancelled"];
  const fn={"all":"전체","pending_payment":"입금대기","payment_confirmed":"입금확인","preparing":"배송준비","shipping":"배송중","delivered":"배송완료","reserved":"예약","cancelled":"취소"};
  if(loading)return <Spin/>;
  return(<div style={{paddingTop:14}}>
    <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:7,marginBottom:14}}>{filters.map(f=><button key={f} onClick={()=>setFlt(f)} style={{padding:"6px 13px",borderRadius:18,border:"1.5px solid "+(flt===f?B:BD),background:flt===f?B:W,color:flt===f?W:GR,fontWeight:flt===f?700:500,fontSize:12,whiteSpace:"nowrap",flexShrink:0}}>{fn[f]}</button>)}</div>
    {disp.length===0?<div style={{textAlign:"center",padding:"56px 0",color:GR}}>해당 주문이 없어요</div>
    :<div style={{display:"flex",flexDirection:"column",gap:9,paddingBottom:20}}>
      {disp.map(o=>{const b=SB_[o.status]||SB_.pending_payment;return(
        <button key={o.orderId} onClick={()=>onSel(o)} style={{background:W,borderRadius:15,border:"1.5px solid "+BD,padding:"13px 14px",textAlign:"left",width:"100%"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}><span style={{fontSize:11,color:GR,fontFamily:"monospace"}}>{o.orderId}</span><div style={{padding:"3px 9px",borderRadius:18,background:b.bg}}><span style={{fontSize:11,fontWeight:700,color:b.t}}>{b.l}</span></div></div>
          <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{o.items[0].name} × {o.items[0].qty}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:12,color:GR}}>입금자: {o.depositor} · {fd(o.createdAt)}</div><span style={{fontSize:13,fontWeight:700,color:OR}}>{fpr(o.total)}</span></div>
          <div style={{fontSize:12,color:GR}}>📍 {o.shipping?.addr1||"-"}</div>
        </button>
      );})}
    </div>}
  </div>);
}

function SDetail({order:o,onClose,onUpd}){
  const[cst,setCst]=useState(""),[showC,setShowC]=useState(false),[upl,setUpl]=useState(false);
  const fRef=useRef(null);
  const b=SB_[o.status]||SB_.pending_payment;
  async function confPay(){
    if(!window.confirm("입금 "+fpr(o.total)+" 확인 처리할까요?"))return;
    const cfg_all=await getStockSetting();
    for(const it of o.items){
      const cfg=cfg_all[it.id]||{total:20,perPerson:2};
      const{data:ords}=await sb.from("orders").select("items,status").in("status",CF).neq("order_id",o.orderId);
      let used=0;for(const ord of(ords||[])){if(!ord.items)continue;for(const i2 of ord.items)if(i2.id===it.id)used+=i2.qty;}
      if(used+it.qty>cfg.total){
        const act=window.confirm("재고 초과! 잔여: "+(cfg.total-used)+"개\n확인: 예약구매 전환\n취소: 주문 취소");
        await onUpd(o.orderId,{status:act?"reserved":"cancelled",cancelledAt:new Date().toISOString(),cs:(o.cs||[]).concat([{at:new Date().toISOString(),note:act?"재고 초과로 예약구매 전환":"재고 초과로 주문 취소"}])});return;
      }
    }
    const now=new Date().toISOString();
    await onUpd(o.orderId,{status:"payment_confirmed",paidAt:now});
    setTimeout(async()=>await onUpd(o.orderId,{status:"preparing",preparingAt:new Date().toISOString()}),900);
  }
  async function startShip(){if(!window.confirm("배송 시작으로 처리할까요?"))return;await onUpd(o.orderId,{status:"shipping",shippingAt:new Date().toISOString()});}
  function handlePhoto(e){const f=e.target.files&&e.target.files[0];if(!f)return;setUpl(true);ri(f,async(err,url)=>{if(err){alert("사진 처리 실패");setUpl(false);return;}await onUpd(o.orderId,{status:"delivered",deliveredAt:new Date().toISOString(),deliveryPhoto:url});setUpl(false);});}
  async function cancel(){if(!window.confirm("이 주문을 취소 처리할까요?"))return;await onUpd(o.orderId,{status:"cancelled",cancelledAt:new Date().toISOString()});}
  async function saveCs(){if(!cst.trim())return;await onUpd(o.orderId,{cs:(o.cs||[]).concat([{at:new Date().toISOString(),note:cst.trim()}])});setCst("");setShowC(false);}
  return(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,.5)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="sUp" style={{width:"100%",maxWidth:480,background:CR,borderRadius:"24px 24px 0 0",maxHeight:"94vh",overflowY:"auto"}}>
      <div style={{position:"sticky",top:0,background:"rgba(251,245,230,.97)",padding:"15px 18px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+BD}}>
        <span style={{fontWeight:700,fontSize:15}}>주문 상세</span>
        <button onClick={onClose} style={{background:CD,border:"none",borderRadius:18,padding:"5px 13px",fontSize:13,color:GR}}>닫기</button>
      </div>
      <div style={{padding:"18px 18px 48px",display:"flex",flexDirection:"column",gap:11}}>
        <div style={{display:"flex",alignItems:"center",gap:10,background:b.bg,borderRadius:14,padding:"13px 16px"}}>
          <div style={{fontSize:20}}>{o.status==="delivered"?"✅":o.status==="cancelled"?"❌":o.status==="reserved"?"📋":"🔄"}</div>
          <div><div style={{fontSize:14,fontWeight:700,color:b.t}}>{b.l}</div><div style={{fontSize:12,color:b.t,opacity:.8,marginTop:1}}>{o.orderId}</div></div>
        </div>
        <IC title="진행 단계"><TL status={o.status} order={o}/></IC>
        <IC title="주문 상품">
          {o.items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{it.name} × {it.qty}</span><span style={{fontWeight:600}}>{fpr(it.price*it.qty)}</span></div>)}
          <div style={{borderTop:"1px solid "+BD,marginTop:9,paddingTop:9,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13}}><span>합계</span><span style={{color:OR}}>{fpr(o.total)}</span></div>
          <div style={{marginTop:8,fontSize:12,color:GR}}>입금자명: <strong style={{color:"#3A2A1A"}}>{o.depositor}</strong></div>
        </IC>
        <IC title="구매자 / 배송지">
          {[["받는 사람",o.shipping?.name],["연락처",o.shipping?.phone||o.shipping?.phoneMasked],["주소",(o.shipping?.addr1||"")+(o.shipping?.addr2?" "+o.shipping.addr2:"")],o.shipping?.memo?["메모",o.shipping.memo]:null,["공동현관",o.shipping?.entryType==="code"?"비밀번호: "+o.shipping.entryCode:"자유롭게 출입 가능"]].filter(Boolean).map(([k,v])=>(
            <div key={k} style={{display:"flex",gap:10,marginBottom:7,fontSize:13}}><span style={{color:GR,minWidth:66,flexShrink:0}}>{k}</span><span style={{fontWeight:600}}>{v||"-"}</span></div>
          ))}
        </IC>
        {o.deliveryPhoto&&<IC title="배송 완료 사진"><img src={o.deliveryPhoto} alt="" style={{width:"100%",borderRadius:11,marginBottom:7}}/><div style={{fontSize:12,color:GR}}>완료: {fd(o.deliveredAt)}</div></IC>}
        {o.cs?.length>0&&<IC title="CS 기록">{o.cs.map((c,i)=><div key={i} style={{background:"#FFF0F0",borderRadius:9,padding:"9px 11px",marginBottom:i<o.cs.length-1?7:0}}><div style={{fontSize:11,color:ER,marginBottom:3}}>{fd(c.at)}</div><div style={{fontSize:13}}>{c.note}</div></div>)}</IC>}
        <div style={{background:W,borderRadius:14,border:"1.5px solid "+BD,padding:"15px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,color:BL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:13}}>판매자 처리</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {o.status==="pending_payment"&&<ABt icon="✅" label="입금 확인 처리" sub="→ 자동으로 배송준비 상태로 전환됩니다" color={B} onClick={confPay}/>}
            {o.status==="preparing"&&<ABt icon="🚚" label="배송 시작" sub="→ 배송중 상태로 전환됩니다" color="#7C3AED" onClick={startShip}/>}
            {o.status==="shipping"&&<><input type="file" accept="image/*" capture="environment" ref={fRef} onChange={handlePhoto} style={{display:"none"}}/><ABt icon="📸" label={upl?"사진 업로드 중…":"배송 사진 등록"} sub="→ 사진 등록 즉시 배송완료 처리됩니다" color="#059669" onClick={()=>fRef.current?.click()} disabled={upl}/></>}
            {!["delivered","cancelled","reserved"].includes(o.status)&&<ABt icon="❌" label="주문 취소" sub="구매자에게 취소 안내가 필요합니다" color={ER} outline onClick={cancel}/>}
            {!showC?<button onClick={()=>setShowC(true)} style={{width:"100%",padding:"12px 14px",borderRadius:13,border:"1.5px solid "+BD,background:CD,color:BL,fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:7}}>💬 CS 메모 추가</button>
            :<div style={{background:CD,borderRadius:13,padding:13}}>
              <textarea value={cst} onChange={e=>setCst(e.target.value)} placeholder="고객 문의 내용 또는 처리 내용을 기록하세요" rows={3} style={{width:"100%",background:W,border:"1.5px solid "+BD,borderRadius:9,padding:"11px 13px",fontSize:13,resize:"none"}}/>
              <div style={{display:"flex",gap:7,marginTop:7}}>
                <button onClick={()=>{setShowC(false);setCst("");}} style={{flex:1,padding:"10px 0",borderRadius:11,border:"1.5px solid "+BD,background:W,color:GR,fontWeight:600,fontSize:13}}>취소</button>
                <button onClick={saveCs} style={{flex:1,padding:"10px 0",borderRadius:11,background:B,color:W,fontWeight:700,fontSize:13,border:"none"}}>저장</button>
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function ABt({icon,label,sub,color,onClick,disabled,outline}){
  return(<button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px 14px",borderRadius:13,background:outline?"transparent":color,border:"2px solid "+color,color:outline?color:W,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:10,textAlign:"left",opacity:disabled?.6:1}}>
    <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
    <div><div>{label}</div>{sub&&<div style={{fontSize:11,fontWeight:400,opacity:.85,marginTop:1}}>{sub}</div>}</div>
  </button>);
}

function SStock(){
  const[st,setSt]=useState(DS),[um,setUm]=useState({}),[saved,setSaved]=useState(false),[loading,setL]=useState(true);
  useEffect(()=>{(async()=>{
    const[cfg,{data:ords}]=await Promise.all([getStockSetting(),sb.from("orders").select("items,status").in("status",CF)]);
    setSt(cfg);
    const m={};PD.forEach(p=>{let u=0;for(const o of(ords||[])){if(!o.items)continue;for(const it of o.items)if(it.id===p.id)u+=it.qty;}m[p.id]=u;});
    setUm(m);setL(false);
  })();},[]);
  async function save(){await saveStockSetting(st);setSaved(true);setTimeout(()=>setSaved(false),2000);}
  function upd(pid,key,val){const n=Math.max(0,parseInt(val)||0);setSt(prev=>({...prev,[pid]:{...prev[pid],[key]:n}}));}
  if(loading)return <Spin/>;
  return(<div style={{paddingTop:16}}>
    <div style={{marginBottom:16}}><div style={{fontFamily:"Georgia,serif",fontSize:20,color:B,fontWeight:700}}>재고 설정</div><div style={{fontSize:13,color:GR,marginTop:3}}>판매 수량과 인당 구매 제한을 설정하세요</div></div>
    <div style={{display:"flex",flexDirection:"column",gap:11,marginBottom:16}}>
      {PD.map(p=>{const cfg=st[p.id]||{total:20,perPerson:2},u=um[p.id]||0,rem=Math.max(0,cfg.total-u),pct=cfg.total>0?Math.round(u/cfg.total*100):0,bc=pct>=90?ER:pct>=70?"#F59E0B":OK;return(
        <div key={p.id} style={{background:W,borderRadius:16,border:"1.5px solid "+BD,padding:"16px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{fontSize:32}}>{p.em}</div><div><div style={{fontSize:14,fontWeight:700}}>{p.nm}</div><div style={{fontSize:12,color:OR,fontWeight:600,marginTop:1}}>{fpr(p.pr)}</div></div></div>
          <div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GR,marginBottom:5}}><span>소진: {u}개</span><span>잔여: <strong style={{color:rem>0?OK:ER}}>{rem}개</strong></span></div><div style={{height:6,background:CD,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:bc,borderRadius:4,transition:"width .5s"}}/></div><div style={{fontSize:11,color:GR,marginTop:3,textAlign:"right"}}>{pct}% 소진</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {[{key:"total",label:"총 판매 수량",sub:"총 판매 가능"},{key:"perPerson",label:"인당 구매 제한",sub:"1인 최대"}].map(({key,label,sub})=>(
              <div key={key}><div style={{fontSize:11,fontWeight:600,color:BL,marginBottom:5}}>{label}</div>
              <div style={{display:"flex",alignItems:"center",background:CD,borderRadius:11,overflow:"hidden",border:"1.5px solid "+BD}}>
                <button onClick={()=>upd(p.id,key,cfg[key]-1)} style={{padding:"9px 11px",background:"none",border:"none",color:BL,fontSize:17,fontWeight:700}}>−</button>
                <input type="number" value={cfg[key]} onChange={e=>upd(p.id,key,e.target.value)} style={{flex:1,border:"none",background:"transparent",textAlign:"center",fontSize:15,fontWeight:700,color:"#3A2A1A",padding:"9px 0"}}/>
                <button onClick={()=>upd(p.id,key,cfg[key]+1)} style={{padding:"9px 11px",background:"none",border:"none",color:BL,fontSize:17,fontWeight:700}}>+</button>
              </div>
              <div style={{fontSize:10,color:GR,marginTop:3,textAlign:"center"}}>{sub}</div></div>
            ))}
          </div>
        </div>
      );})}
    </div>
    <button onClick={save} style={{width:"100%",padding:"15px 0",borderRadius:15,background:saved?"#059669":"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:15,border:"none",boxShadow:"0 4px 14px rgba(107,76,42,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:10,transition:"background .3s"}}>{saved?"✅ 저장 완료!":"⚙️ 재고 설정 저장"}</button>
    <div style={{padding:"11px 13px",background:CD,borderRadius:11,fontSize:12,color:GR,lineHeight:1.7}}>💡 재고 설정은 즉시 구매자 화면에 반영됩니다. 입금 확인된 주문 기준으로 잔여 수량이 계산됩니다.</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
