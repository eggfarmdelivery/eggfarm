async function getStockCfg(){const{data}=await sb.from("stock_settings").select("*");if(!data||!data.length)return DS;const r={};data.forEach(x=>{r[x.product_id]={total:x.total,perPerson:x.per_person};});return r;}

async function calcStk(pid,myHash){
  const[cfg_all,{data:ords}]=await Promise.all([getStockCfg(),sb.from("orders").select("phone_hash,items,status,ordered_at").in("status",CF)]);
  const cfg=cfg_all[pid]||{total:20,perPerson:2};
  const todayStr=today();
  let ut=0,mu=0;
  for(const o of(ords||[])){
    if(!o.items)continue;
    for(const it of o.items){
      if(it.id!==pid)continue;
      ut+=it.qty;
      if(o.phone_hash===myHash){
        const orderDate=(o.ordered_at||"").slice(0,10);
        if(orderDate===todayStr)mu+=it.qty;
      }
    }
  }
  const rt=Math.max(0,cfg.total-ut),rm=Math.max(0,cfg.perPerson-mu);
  return{total:cfg.total,perPerson:cfg.perPerson,usedTotal:ut,remainTotal:rt,myUsed:mu,remainMy:rm,canBuy:Math.min(rt,rm)};
}
