function fpr(n){return n.toLocaleString("ko-KR")+"원";}
function fd(s){if(!s)return"-";const d=new Date(s);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function ri(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const ratio=Math.min(1,800/img.width),w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(null,c.toDataURL("image/jpeg",.75));};img.onerror=e2=>cb(e2);img.src=e.target.result;};r.onerror=e=>cb(e);r.readAsDataURL(file);}

function mo(r){return{orderId:r.order_id,phoneHash:r.phone_hash,phoneMasked:r.phone_masked,items:r.items||[],total:r.total,depositor:r.depositor,shipping:r.shipping||{},status:r.status,createdAt:r.created_at,orderedAt:r.ordered_at,paidAt:r.paid_at,preparingAt:r.preparing_at,shippingAt:r.shipping_at,deliveredAt:r.delivered_at,cancelledAt:r.cancelled_at,deliveryPhoto:r.delivery_photo,cs:r.cs||[]};}
async function getAllOrders(){const{data}=await sb.from("orders").select("*").order("created_at",{ascending:false});return(data||[]).map(mo);}
async function patchOrder(id,patch){
  const d={};
  if(patch.status!==undefined)d.status=patch.status;
  if(patch.paidAt!==undefined)d.paid_at=patch.paidAt;
  if(patch.preparingAt!==undefined)d.preparing_at=patch.preparingAt;
  if(patch.shippingAt!==undefined)d.shipping_at=patch.shippingAt;
  if(patch.deliveredAt!==undefined)d.delivered_at=patch.deliveredAt;
  if(patch.cancelledAt!==undefined)d.cancelled_at=patch.cancelledAt;
  if(patch.deliveryPhoto!==undefined)d.delivery_photo=patch.deliveryPhoto;
  if(patch.cs!==undefined)d.cs=patch.cs;
  await sb.from("orders").update(d).eq("order_id",id);
}
async function getStockCfg(){const{data}=await sb.from("stock_settings").select("*");if(!data||!data.length)return DS;const r={};data.forEach(x=>{r[x.product_id]={total:x.total,perPerson:x.per_person};});return r;}
async function saveStockCfg(st){const rows=Object.entries(st).map(([pid,c])=>({product_id:pid,total:c.total,per_person:c.perPerson}));await sb.from("stock_settings").upsert(rows);}

function IC({title,children}){return(<div style={{background:W,borderRadius:15,border:"1.5px solid "+BD,padding:"15px 16px",marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:BL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:11}}>{title}</div>{children}</div>);}
function Spin(){return <div style={{textAlign:"center",padding:"60px 0",color:GR,fontSize:14}}>불러오는 중…</div>;}
function TL({status,order:o}){

  return(<div>{STEPS.map((s,i)=>{const done=i<=ci,active=i===ci;return(<div key={s} style={{display:"flex",gap:10,marginBottom:i<STEPS.length-1?12:0}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
      <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:done?"#DCFCE7":CD,border:"2px solid "+(active?B:done?"#86EFAC":BD)}}>{done?<span style={{fontSize:11,color:OK}}>✓</span>:<span style={{fontSize:9,color:GR}}>{i+1}</span>}</div>
      {i<STEPS.length-1&&<div style={{width:2,flex:1,margin:"3px 0",background:(done&&i<ci)?"#86EFAC":BD}}/>}
    </div>
    <div style={{paddingTop:2}}><div style={{fontSize:12,fontWeight:active?700:done?600:400,color:active?B:done?"#3A2A1A":GR}}>{SLBL[i]}</div>{tm[s]&&done&&<div style={{fontSize:11,color:GR,marginTop:1}}>{fd(tm[s])}</div>}</div>
  </div>);})}</div>);
}

        {er&&<div style={{background:"#FFF0EE",border:"1px solid #F5C6C0",borderRadius:9,padding:"9px 13px",color:ER,fontSize:13,marginBottom:14}}>⚠️ {er}</div>}
        <button onClick={go} style={{width:"100%",padding:"14px 0",borderRadius:13,background:"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:15,border:"none",boxShadow:"0 4px 14px rgba(107,76,42,.28)"}}>로그인</button>
        <div style={{marginTop:12,padding:"10px",background:CD,borderRadius:10,fontSize:12,color:GR,textAlign:"center"}}>데모 비밀번호: <strong style={{color:B}}>eggfarm2026</strong></div>

function Admin({onOut}){
  const[tab,setTab]=useState("dash");
  const[ords,setOrds]=useState([]),[loading,setL]=useState(true);
  const[sel,setSel]=useState(null);
  const[flt,setFlt]=useState(null); // null=전체, "pending_payment" 등

  async function load(){setL(true);setOrds(await getAllOrders());setL(false);}
  useEffect(()=>{load();},[]);

  async function upd(id,patch){
    await patchOrder(id,patch);
    const updated={...(ords.find(o=>o.orderId===id)||sel||{}),...patch};

  const st={
    total:ords.length,
    pending:ords.filter(o=>o.status==="pending_payment").length,
    paid:ords.filter(o=>["payment_confirmed","preparing"].includes(o.status)).length,
    ship:ords.filter(o=>o.status==="shipping").length,
    done:ords.filter(o=>o.status==="delivered").length,
    rev:ords.filter(o=>CF.includes(o.status)).reduce((s,o)=>s+o.total,0),
  };

  // 필터된 주문 목록
  const filtered=flt?ords.filter(o=>o.status===flt):ords;

  return(<div style={{minHeight:"100vh",paddingBottom:80}}>
    <header style={{background:"linear-gradient(135deg,"+B+","+BL+")",padding:"44px 16px 16px",position:"sticky",top:0,zIndex:40}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:10,color:"rgba(255,255,255,.7)",letterSpacing:".1em"}}>SELLER ADMIN</div><div style={{fontFamily:"Georgia,serif",fontSize:19,fontWeight:700,color:W}}>🐔 에그팜 관리자</div></div>
        <div style={{display:"flex",gap:7}}>

          <button onClick={onOut} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:9,padding:"8px 12px",color:W,fontSize:12,fontWeight:600}}>로그아웃</button>
        </div>
      </div>
    </header>

    <main style={{padding:"0 14px"}}>
      {tab==="dash"&&<Dash st={st} ords={ords} filtered={filtered} flt={flt} setFlt={setFlt} loading={loading} onSel={setSel}/>}
      {tab==="stock"&&<Stock/>}
    </main>

    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+BD,display:"grid",gridTemplateColumns:"repeat(2,1fr)",padding:"6px 0 10px"}}>
      {[{k:"dash",e:"📊",l:"대시보드"},{k:"stock",e:"⚙️",l:"재고설정"}].map(({k,e,l})=>(
        <button key={k} onClick={()=>setTab(k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",padding:"5px 0"}}>

    {sel&&<Detail order={sel} onClose={()=>setSel(null)} onUpd={upd}/>}
  </div>);

// ★ 대시보드 - 2x2 카드 + 하단 주문 목록
function Dash({st,ords,filtered,flt,setFlt,loading,onSel}){
  if(loading)return <Spin/>;

  const cards=[
    {key:"pending_payment",  label:"입금대기", value:st.pending, bg:"#FEF3C7",t:"#92400E",dot:"#F59E0B",em:"⏳"},
    {key:"preparing",        label:"배송준비", value:st.paid,    bg:"#EDE9FE",t:"#4C1D95",dot:"#8B5CF6",em:"📦"},
    {key:"shipping",         label:"배송중",   value:st.ship,    bg:"#DBEAFE",t:"#1E40AF",dot:"#3B82F6",em:"🚚"},
    {key:"delivered",        label:"배송완료", value:st.done,    bg:"#DCFCE7",t:"#166534",dot:"#10B981",em:"✅"},
  ];

  return(<div style={{paddingTop:16}}>
    {/* 매출 */}
    <div style={{background:"linear-gradient(135deg,"+B+","+BL+")",borderRadius:18,padding:"18px 18px",marginBottom:16,color:W}}>
      <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:3}}>입금확인 기준 총 매출</div>
      <div style={{fontSize:28,fontWeight:700}}>{fpr(st.rev)}</div>
      <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginTop:3}}>총 {st.total}건 주문</div>
    </div>

    {/* 2x2 카드 */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      {cards.map(c=>(
        <button key={c.key} onClick={()=>setFlt(flt===c.key?null:c.key)}
          style={{background:flt===c.key?c.t:W,borderRadius:16,padding:"16px 14px",textAlign:"left",border:"2px solid "+(flt===c.key?c.t:BD),transition:"all .2s",boxShadow:flt===c.key?"0 4px 16px rgba(0,0,0,.15)":"none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:22}}>{c.em}</span>
            <div style={{width:8,height:8,borderRadius:"50%",background:flt===c.key?W:c.dot}}/>
          </div>
          <div style={{fontSize:28,fontWeight:700,color:flt===c.key?W:c.t,marginBottom:4}}>{c.value}</div>
          <div style={{fontSize:12,color:flt===c.key?"rgba(255,255,255,.85)":c.t,fontWeight:600}}>{c.label}</div>
        </button>
      ))}
    </div>

    {/* 필터 헤더 */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:B}}>
        {flt?SB_[flt]?.l||"":"전체"} 주문
        <span style={{fontSize:12,color:GR,fontWeight:400,marginLeft:6}}>{filtered.length}건</span>
      </div>
      {flt&&<button onClick={()=>setFlt(null)} style={{fontSize:12,color:GR,background:"none",border:"1px solid "+BD,borderRadius:12,padding:"4px 10px"}}>전체보기</button>}
    </div>

    {/* 주문 목록 */}
    {filtered.length===0?<div style={{textAlign:"center",padding:"40px 0",color:GR,fontSize:14}}>해당 주문이 없어요</div>
    :<div style={{display:"flex",flexDirection:"column",gap:9,paddingBottom:20}}>
      {filtered.map(o=>{
        const b=SB_[o.status]||SB_.pending_payment;
        return(<button key={o.orderId} onClick={()=>onSel(o)} style={{background:W,borderRadius:14,border:"1.5px solid "+BD,padding:"13px 14px",textAlign:"left",width:"100%"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:11,color:GR,fontFamily:"monospace"}}>{o.orderId}</span>
            <div style={{padding:"3px 9px",borderRadius:18,background:b.bg}}><span style={{fontSize:11,fontWeight:700,color:b.t}}>{b.l}</span></div>
          </div>
          {/* 입금대기: 핵심 정보 크게 표시 */}
          {o.status==="pending_payment"?(
            <div style={{background:"#FEF9E7",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:14,fontWeight:700}}>{o.items[0].name} × {o.items[0].qty}</span>
                <span style={{fontSize:15,fontWeight:700,color:OR}}>{fpr(o.total)}</span>
              </div>
              <div style={{fontSize:12,color:"#92400E"}}>입금자: <strong>{o.depositor}</strong></div>
            </div>
          ):(
            <div style={{marginBottom:6}}>
              <div style={{fontSize:14,fontWeight:700,marginBottom:2}}>{o.items[0].name}</div>
              <div style={{fontSize:12,color:GR}}>입금자: {o.depositor} · {fpr(o.total)}</div>
            </div>
          )}
          <div style={{fontSize:11,color:GR}}>📍 {o.shipping?.addr1||"-"} · {fd(o.createdAt)}</div>
        </button>);
      })}
    </div>}
  </div>);
}

// ★ 주문 상세 + 판매자 액션
function Detail({order:o,onClose,onUpd}){
  const[cst,setCst]=useState(""),[showC,setShowC]=useState(false),[upl,setUpl]=useState(false);
  const[photoConfirm,setPhotoConfirm]=useState(null); // ★ 사진 확인 팝업
  const fRef=useRef(null);
  const b=SB_[o.status]||SB_.pending_payment;

  async function confPay(){
    if(!window.confirm("입금 "+fpr(o.total)+" 확인 처리할까요?"))return;
    const cfg_all=await getStockCfg();
    for(const it of o.items){
      const cfg=cfg_all[it.id]||{total:20,perPerson:2};
      const{data:ords}=await sb.from("orders").select("items,status").in("status",CF).neq("order_id",o.orderId);
      let used=0;for(const ord of(ords||[])){if(!ord.items)continue;for(const i2 of ord.items)if(i2.id===it.id)used+=i2.qty;}
      if(used+it.qty>cfg.total){
        const act=window.confirm("재고 초과! 잔여: "+(cfg.total-used)+"개\n확인: 예약구매 전환\n취소: 주문 취소");
        await onUpd(o.orderId,{status:act?"reserved":"cancelled",cancelledAt:new Date().toISOString(),cs:(o.cs||[]).concat([{at:new Date().toISOString(),note:act?"재고 초과로 예약구매 전환":"재고 초과로 주문 취소"}])});return;
      }
    }
    const now=new Date().toISOString();
    await onUpd(o.orderId,{status:"payment_confirmed",paidAt:now});
    setTimeout(async()=>await onUpd(o.orderId,{status:"preparing",preparingAt:new Date().toISOString()}),900);
  }

  async function startShip(){if(!window.confirm("배송 시작으로 처리할까요?"))return;await onUpd(o.orderId,{status:"shipping",shippingAt:new Date().toISOString()});}

  // ★ 사진 업로드 → 확인 팝업 → 배송완료
  function handlePhoto(e){
    const f=e.target.files&&e.target.files[0];if(!f)return;
    setUpl(true);
    ri(f,async(err,url)=>{
      setUpl(false);
      if(err){alert("사진 처리 실패");return;}
      setPhotoConfirm(url); // 팝업 띄우기
    });
  }

  async function confirmDelivery(){
    await onUpd(o.orderId,{status:"delivered",deliveredAt:new Date().toISOString(),deliveryPhoto:photoConfirm});
    setPhotoConfirm(null);
  }

  async function cancel(){if(!window.confirm("이 주문을 취소 처리할까요?"))return;await onUpd(o.orderId,{status:"cancelled",cancelledAt:new Date().toISOString()});}
  async function saveCs(){if(!cst.trim())return;await onUpd(o.orderId,{cs:(o.cs||[]).concat([{at:new Date().toISOString(),note:cst.trim()}])});setCst("");setShowC(false);}

  return(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,.5)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

    {/* ★ 배송완료 확인 팝업 */}
    {photoConfirm&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"rgba(0,0,0,.6)"}}>
      <div className="fIn" style={{background:W,borderRadius:22,padding:22,maxWidth:360,width:"100%"}}>
        <div style={{fontSize:16,fontWeight:700,color:B,marginBottom:12,textAlign:"center"}}>📸 배송완료로 변경하시겠어요?</div>
        <img src={photoConfirm} alt="" style={{width:"100%",borderRadius:12,marginBottom:14}}/>
        <div style={{fontSize:13,color:GR,textAlign:"center",marginBottom:16}}>사진이 등록되고 배송완료 상태로 변경됩니다.</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setPhotoConfirm(null)} style={{flex:1,padding:"13px 0",borderRadius:14,border:"1.5px solid "+BD,background:CD,color:BL,fontWeight:600,fontSize:14}}>취소</button>
          <button onClick={confirmDelivery} style={{flex:1,padding:"13px 0",borderRadius:14,background:"#059669",color:W,fontWeight:700,fontSize:14,border:"none"}}>✅ 배송완료 처리</button>
        </div>
      </div>
    </div>}

    <div className="sUp" style={{width:"100%",maxWidth:480,background:CR,borderRadius:"24px 24px 0 0",maxHeight:"94vh",overflowY:"auto"}}>
      <div style={{position:"sticky",top:0,background:"rgba(251,245,230,.97)",padding:"15px 18px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+BD}}>
        <span style={{fontWeight:700,fontSize:15}}>주문 상세</span>
        <button onClick={onClose} style={{background:CD,border:"none",borderRadius:18,padding:"5px 13px",fontSize:13,color:GR}}>닫기</button>
      </div>

      <div style={{padding:"18px 18px 48px",display:"flex",flexDirection:"column",gap:11}}>
        <div style={{display:"flex",alignItems:"center",gap:10,background:b.bg,borderRadius:14,padding:"13px 16px"}}>
          <div style={{fontSize:20}}>{o.status==="delivered"?"✅":o.status==="cancelled"?"❌":o.status==="reserved"?"📋":"🔄"}</div>
          <div><div style={{fontSize:14,fontWeight:700,color:b.t}}>{b.l}</div><div style={{fontSize:12,color:b.t,opacity:.8,marginTop:1}}>{o.orderId}</div></div>
        </div>

        <IC title="진행 단계"><TL status={o.status} order={o}/></IC>

        <IC title="주문 상품">
          {o.items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{it.name} × {it.qty}</span><span style={{fontWeight:600}}>{fpr(it.price*it.qty)}</span></div>)}
          <div style={{borderTop:"1px solid "+BD,marginTop:9,paddingTop:9,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13}}><span>합계</span><span style={{color:OR}}>{fpr(o.total)}</span></div>
          <div style={{marginTop:8,fontSize:12,color:GR}}>입금자명: <strong style={{color:"#3A2A1A"}}>{o.depositor}</strong></div>
        </IC>

        <IC title="구매자 / 배송지">
          {[["받는 사람",o.shipping?.name],["연락처",o.shipping?.phone||o.shipping?.phoneMasked],["주소",(o.shipping?.addr1||"")+(o.shipping?.addr2?" "+o.shipping.addr2:"")],o.shipping?.memo?["메모",o.shipping.memo]:null,["공동현관",o.shipping?.entryType==="code"?"비밀번호: "+o.shipping.entryCode:"자유롭게 출입 가능"]].filter(Boolean).map(([k,v])=>(
            <div key={k} style={{display:"flex",gap:10,marginBottom:7,fontSize:13}}><span style={{color:GR,minWidth:66,flexShrink:0}}>{k}</span><span style={{fontWeight:600}}>{v||"-"}</span></div>
          ))}
        </IC>

        {o.deliveryPhoto&&<IC title="배송 완료 사진"><img src={o.deliveryPhoto} alt="" style={{width:"100%",borderRadius:11,marginBottom:7}}/><div style={{fontSize:12,color:GR}}>완료: {fd(o.deliveredAt)}</div></IC>}
        {o.cs?.length>0&&<IC title="CS 기록">{o.cs.map((c,i)=><div key={i} style={{background:"#FFF0F0",borderRadius:9,padding:"9px 11px",marginBottom:i<o.cs.length-1?7:0}}><div style={{fontSize:11,color:ER,marginBottom:3}}>{fd(c.at)}</div><div style={{fontSize:13}}>{c.note}</div></div>)}</IC>}

        {/* 액션 버튼 */}
        <div style={{background:W,borderRadius:14,border:"1.5px solid "+BD,padding:"15px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,color:BL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:13}}>판매자 처리</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {o.status==="pending_payment"&&<ABt icon="✅" label="입금 확인 처리" sub="→ 자동으로 배송준비 상태로 전환됩니다" color={B} onClick={confPay}/>}
            {o.status==="preparing"&&<ABt icon="🚚" label="배송 시작" sub="→ 배송중 상태로 전환됩니다" color="#7C3AED" onClick={startShip}/>}
            {o.status==="shipping"&&<>
              <input type="file" accept="image/*" capture="environment" ref={fRef} onChange={handlePhoto} style={{display:"none"}}/>
              <ABt icon={upl?"⏳":"📸"} label={upl?"사진 처리 중…":"배송 사진 등록"} sub="→ 사진 확인 후 배송완료로 변경됩니다" color="#059669" onClick={()=>fRef.current?.click()} disabled={upl}/>
            </>}
            {!["delivered","cancelled","reserved"].includes(o.status)&&<ABt icon="❌" label="주문 취소" sub="구매자에게 취소 안내가 필요합니다" color={ER} outline onClick={cancel}/>}
            {!showC?<button onClick={()=>setShowC(true)} style={{width:"100%",padding:"12px 14px",borderRadius:13,border:"1.5px solid "+BD,background:CD,color:BL,fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:7}}>💬 CS 메모 추가</button>
            :<div style={{background:CD,borderRadius:13,padding:13}}>
              <textarea value={cst} onChange={e=>setCst(e.target.value)} placeholder="고객 문의 내용 또는 처리 내용을 기록하세요" rows={3} style={{width:"100%",background:W,border:"1.5px solid "+BD,borderRadius:9,padding:"11px 13px",fontSize:13,resize:"none"}}/>
              <div style={{display:"flex",gap:7,marginTop:7}}>
                <button onClick={()=>{setShowC(false);setCst("");}} style={{flex:1,padding:"10px 0",borderRadius:11,border:"1.5px solid "+BD,background:W,color:GR,fontWeight:600,fontSize:13}}>취소</button>
                <button onClick={saveCs} style={{flex:1,padding:"10px 0",borderRadius:11,background:B,color:W,fontWeight:700,fontSize:13,border:"none"}}>저장</button>
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

function ABt({icon,label,sub,color,onClick,disabled,outline}){
  return(<button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px 14px",borderRadius:13,background:outline?"transparent":color,border:"2px solid "+color,color:outline?color:W,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:10,textAlign:"left",opacity:disabled?.6:1}}>
    <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
    <div><div>{label}</div>{sub&&<div style={{fontSize:11,fontWeight:400,opacity:.85,marginTop:1}}>{sub}</div>}</div>
  </button>);
}

// ── 재고 설정 ──
function Stock(){
  const[st,setSt]=useState(DS),[um,setUm]=useState({}),[saved,setSaved]=useState(false),[loading,setL]=useState(true);
  useEffect(()=>{(async()=>{
    const[cfg,{data:ords}]=await Promise.all([getStockCfg(),sb.from("orders").select("items,status").in("status",CF)]);
    setSt(cfg);
    const m={};PD.forEach(p=>{let u=0;for(const o of(ords||[])){if(!o.items)continue;for(const it of o.items)if(it.id===p.id)u+=it.qty;}m[p.id]=u;});
    setUm(m);setL(false);
  })();},[]);
  async function save(){await saveStockCfg(st);setSaved(true);setTimeout(()=>setSaved(false),2000);}
  function upd(pid,key,val){const n=Math.max(0,parseInt(val)||0);setSt(prev=>({...prev,[pid]:{...prev[pid],[key]:n}}));}
  if(loading)return <Spin/>;
  return(<div style={{paddingTop:16}}>
    <div style={{marginBottom:16}}><div style={{fontFamily:"Georgia,serif",fontSize:20,color:B,fontWeight:700}}>재고 설정</div><div style={{fontSize:13,color:GR,marginTop:3}}>판매 수량과 인당 구매 제한을 설정하세요</div></div>
    <div style={{display:"flex",flexDirection:"column",gap:11,marginBottom:16}}>
      {PD.map(p=>{const cfg=st[p.id]||{total:20,perPerson:2},u=um[p.id]||0,rem=Math.max(0,cfg.total-u),pct=cfg.total>0?Math.round(u/cfg.total*100):0,bc=pct>=90?ER:pct>=70?"#F59E0B":OK;return(
        <div key={p.id} style={{background:W,borderRadius:16,border:"1.5px solid "+BD,padding:"16px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{fontSize:32}}>{p.em}</div><div><div style={{fontSize:14,fontWeight:700}}>{p.nm}</div><div style={{fontSize:12,color:OR,fontWeight:600,marginTop:1}}>{fpr(p.pr)}</div></div></div>
          <div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GR,marginBottom:5}}><span>소진: {u}개</span><span>잔여: <strong style={{color:rem>0?OK:ER}}>{rem}개</strong></span></div><div style={{height:6,background:CD,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:bc,borderRadius:4}}/></div><div style={{fontSize:11,color:GR,marginTop:3,textAlign:"right"}}>{pct}% 소진</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {[{key:"total",label:"총 판매 수량",sub:"총 판매 가능"},{key:"perPerson",label:"인당 구매 제한",sub:"1일 최대"}].map(({key,label,sub})=>(
              <div key={key}><div style={{fontSize:11,fontWeight:600,color:BL,marginBottom:5}}>{label}</div>
              <div style={{display:"flex",alignItems:"center",background:CD,borderRadius:11,overflow:"hidden",border:"1.5px solid "+BD}}>
                <button onClick={()=>upd(p.id,key,cfg[key]-1)} style={{padding:"9px 11px",background:"none",border:"none",color:BL,fontSize:17,fontWeight:700}}>−</button>
                <input type="number" value={cfg[key]} onChange={e=>upd(p.id,key,e.target.value)} style={{flex:1,border:"none",background:"transparent",textAlign:"center",fontSize:15,fontWeight:700,color:"#3A2A1A",padding:"9px 0"}}/>
                <button onClick={()=>upd(p.id,key,cfg[key]+1)} style={{padding:"9px 11px",background:"none",border:"none",color:BL,fontSize:17,fontWeight:700}}>+</button>
              </div>
              <div style={{fontSize:10,color:GR,marginTop:3,textAlign:"center"}}>{sub}</div></div>
            ))}
          </div>
        </div>
      );})}
    </div>
    <button onClick={save} style={{width:"100%",padding:"15px 0",borderRadius:15,background:saved?"#059669":"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:15,border:"none",boxShadow:"0 4px 14px rgba(107,76,42,.25)",display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:10,transition:"background .3s"}}>{saved?"✅ 저장 완료!":"⚙️ 재고 설정 저장"}</button>
    <div style={{padding:"11px 13px",background:CD,borderRadius:11,fontSize:12,color:GR,lineHeight:1.7}}>💡 재고 설정 저장 후 즉시 구매자 화면에 반영됩니다.<br/>인당 구매 제한은 하루 기준으로 초기화됩니다.</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
