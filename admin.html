function fpr(n){return n.toLocaleString("ko-KR")+"원";}
function fd(s){if(!s)return"-";const d=new Date(s);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function fdate(s){if(!s)return"-";const d=new Date(s);return d.getFullYear()+"."+(d.getMonth()+1)+"."+d.getDate();}
function toDateStr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function genBatchId(){const d=new Date();return "B"+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+Math.floor(100+Math.random()*900);}
function ri(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const ratio=Math.min(1,800/img.width),w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(null,c.toDataURL("image/jpeg",.75));};img.onerror=e2=>cb(e2);img.src=e.target.result;};r.onerror=e=>cb(e);r.readAsDataURL(file);}

// DB 함수
function mapOrder(r){return{orderId:r.order_id,phoneHash:r.phone_hash,phoneMasked:r.phone_masked,items:r.items||[],total:r.total,depositor:r.depositor,shipping:r.shipping||{},status:r.status,batchId:r.batch_id,createdAt:r.created_at,orderedAt:r.ordered_at,paidAt:r.paid_at,preparingAt:r.preparing_at,shippingAt:r.shipping_at,deliveredAt:r.delivered_at,cancelledAt:r.cancelled_at,deliveryPhoto:r.delivery_photo,cs:r.cs||[]};}
function mapBatch(r){return{batchId:r.batch_id,title:r.title,saleStart:r.sale_start,saleEnd:r.sale_end,status:r.status,memo:r.memo,createdAt:r.created_at};}
async function getAllOrders(){const{data}=await sb.from("orders").select("*").order("created_at",{ascending:false});return(data||[]).map(mapOrder);}
async function getBatches(){const{data}=await sb.from("batches").select("*").order("sale_start",{ascending:false});return(data||[]).map(mapBatch);}
async function createBatch(b){await sb.from("batches").insert({batch_id:b.batchId,title:b.title,sale_start:b.saleStart,sale_end:b.saleEnd,status:"open",memo:b.memo||""});}
async function closeBatch(batchId){await sb.from("batches").update({status:"closed"}).eq("batch_id",batchId);}
async function assignOrdersToBatch(batchId,saleStart,saleEnd){
  await sb.from("orders").update({batch_id:batchId}).gte("ordered_at",saleStart+" 00:00:00").lte("ordered_at",saleEnd+" 23:59:59").is("batch_id",null);
}
async function patchOrder(id,patch){
  const d={};
  if(patch.status!==undefined)d.status=patch.status;
  if(patch.paidAt!==undefined)d.paid_at=patch.paidAt;
  if(patch.preparingAt!==undefined)d.preparing_at=patch.preparingAt;
  if(patch.shippingAt!==undefined)d.shipping_at=patch.shippingAt;
  if(patch.deliveredAt!==undefined)d.delivered_at=patch.deliveredAt;
  if(patch.cancelledAt!==undefined)d.cancelled_at=patch.cancelledAt;
  if(patch.deliveryPhoto!==undefined)d.delivery_photo=patch.deliveryPhoto;
  if(patch.cs!==undefined)d.cs=patch.cs;
  if(patch.batchId!==undefined)d.batch_id=patch.batchId;
  await sb.from("orders").update(d).eq("order_id",id);
}
async function getStockCfg(){const{data}=await sb.from("stock_settings").select("*");const DS={p1:{total:20,perPerson:2},p2:{total:30,perPerson:3},p3:{total:15,perPerson:2},p4:{total:10,perPerson:1}};if(!data||!data.length)return DS;const r={};data.forEach(x=>{r[x.product_id]={total:x.total,perPerson:x.per_person};});return r;}
async function saveStockCfg(st){const rows=Object.entries(st).map(([pid,c])=>({product_id:pid,total:c.total,per_person:c.perPerson}));await sb.from("stock_settings").upsert(rows);}

// 공용 UI
function IC({title,children}){return(<div style={{background:W,borderRadius:15,border:"1.5px solid "+BD,padding:"15px 16px",marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:BL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:11}}>{title}</div>{children}</div>);}
function ABt({icon,label,sub,color,onClick,disabled,outline}){return(<button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px 14px",borderRadius:13,background:outline?"transparent":color,border:"2px solid "+color,color:outline?color:W,fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:10,textAlign:"left",opacity:disabled?.6:1}}><span style={{fontSize:18,flexShrink:0}}>{icon}</span><div><div>{label}</div>{sub&&<div style={{fontSize:11,fontWeight:400,opacity:.85,marginTop:1}}>{sub}</div>}</div></button>);}
function Spin(){return <div style={{textAlign:"center",padding:"60px 0",color:GR,fontSize:14}}>불러오는 중…</div>;}
function TL({status,order:o}){
  const ci=STEPS.indexOf(status);
  const tm={ordered:o.orderedAt||o.createdAt,pending_payment:o.orderedAt||o.createdAt,payment_confirmed:o.paidAt,preparing:o.preparingAt||o.paidAt,shipping:o.shippingAt,delivered:o.deliveredAt};
  return(<div>{STEPS.map((s,i)=>{const done=i<=ci,active=i===ci;return(<div key={s} style={{display:"flex",gap:10,marginBottom:i<STEPS.length-1?12:0}}><div style={{display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:done?"#DCFCE7":CD,border:"2px solid "+(active?B:done?"#86EFAC":BD)}}>{done?<span style={{fontSize:11,color:OK}}>✓</span>:<span style={{fontSize:9,color:GR}}>{i+1}</span>}</div>{i<STEPS.length-1&&<div style={{width:2,flex:1,margin:"3px 0",background:(done&&i<ci)?"#86EFAC":BD}}/>}</div><div style={{paddingTop:2}}><div style={{fontSize:12,fontWeight:active?700:done?600:400,color:active?B:done?"#3A2A1A":GR}}>{SLBL[i]}</div>{tm[s]&&done&&<div style={{fontSize:11,color:GR,marginTop:1}}>{fd(tm[s])}</div>}</div></div>);})}</div>);
}

function App(){
  const[auth,setAuth]=useState(false);

    <div style={{width:"100%",maxWidth:340}}>

      <div style={{background:W,borderRadius:22,padding:24,boxShadow:"0 4px 20px rgba(107,76,42,.1)"}}>
        <div style={{marginBottom:14}}><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:7}}>관리자 비밀번호</div><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setEr("");}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="비밀번호 입력" style={{width:"100%",padding:"13px 14px",borderRadius:13,border:"1.5px solid "+(er?ER:BD),fontSize:15,background:CR}}/></div>
        {er&&<div style={{background:"#FFF0EE",border:"1px solid #F5C6C0",borderRadius:9,padding:"9px 13px",color:ER,fontSize:13,marginBottom:14}}>⚠️ {er}</div>}
        <button onClick={go} style={{width:"100%",padding:"14px 0",borderRadius:13,background:"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:15,border:"none"}}>로그인</button>
        <div style={{marginTop:12,padding:"10px",background:CD,borderRadius:10,fontSize:12,color:GR,textAlign:"center"}}>데모 비밀번호: <strong style={{color:B}}>eggfarm2026</strong></div>
      </div>
    </div>
  </div>);
}

function Admin({onOut,adminPw,setAdminPw}){
  const[tab,setTab]=useState("dash");
  const[orders,setOrders]=useState([]);
  const[batches,setBatches]=useState([]);
  const[loading,setL]=useState(true);
  const[sel,setSel]=useState(null);
  const[undoData,setUndoData]=useState(null);
  const[undoTimer,setUndoTimer]=useState(null);

  async function load(){
    setL(true);
    const[ords,bats]=await Promise.all([getAllOrders(),getBatches()]);
    setOrders(ords);setBatches(bats);setL(false);
  }
  useEffect(()=>{load();},[]);

  async function upd(id,patch){
    await patchOrder(id,patch);
    const updated={...(orders.find(o=>o.orderId===id)||sel||{}),...patch};
    setOrders(arr=>arr.map(o=>o.orderId===id?updated:o));
    if(sel?.orderId===id)setSel(updated);
  }
  function updWithUndo(id,patch,prevPatch,label){
    upd(id,patch);
    if(undoTimer)clearTimeout(undoTimer);
    setUndoData({orderId:id,prevPatch,label});
    const t=setTimeout(()=>setUndoData(null),30000);
    setUndoTimer(t);
  }
  function doUndo(){if(!undoData)return;upd(undoData.orderId,undoData.prevPatch);setUndoData(null);if(undoTimer)clearTimeout(undoTimer);}

  // 현재 열린 회차
  const activeBatch=batches.find(b=>b.status==="open");
  // 현재 회차 주문 (활성 회차가 있으면 해당 기간 주문)
  const activeOrders=activeBatch
    ? orders.filter(o=>{const d=(o.orderedAt||o.createdAt||"").slice(0,10);return d>=activeBatch.saleStart&&d<=activeBatch.saleEnd;})
    : orders.filter(o=>!o.batchId);

  const st={
    pending:activeOrders.filter(o=>o.status==="pending_payment").length,
    paid:activeOrders.filter(o=>["payment_confirmed","preparing"].includes(o.status)).length,
    ship:activeOrders.filter(o=>o.status==="shipping").length,
    done:activeOrders.filter(o=>o.status==="delivered").length,
    rev:activeOrders.filter(o=>CF.includes(o.status)).reduce((s,o)=>s+o.total,0),
  };

  return(<div style={{minHeight:"100vh",paddingBottom:80,background:"#F0EBE1"}}>
    <header style={{background:"linear-gradient(135deg,"+B+","+BL+")",padding:"44px 16px 16px",position:"sticky",top:0,zIndex:40}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style={{fontSize:10,color:"rgba(255,255,255,.7)",letterSpacing:".1em"}}>SELLER ADMIN</div><div style={{fontFamily:"Georgia,serif",fontSize:19,fontWeight:700,color:W}}>🐔 에그팜 관리자</div></div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={load} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:9,padding:"8px 10px",color:W,fontSize:16}}>🔄</button>
          <button onClick={onOut} style={{background:"rgba(255,255,255,.18)",border:"none",borderRadius:9,padding:"8px 12px",color:W,fontSize:12,fontWeight:600}}>로그아웃</button>
        </div>
      </div>
    </header>

    {/* 복원 토스트 */}
    {undoData&&(<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:60,background:"#1F2937",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 20px rgba(0,0,0,.3)",maxWidth:380,width:"calc(100% - 32px)"}}>
      <span style={{fontSize:13,color:W,flex:1}}>✅ {undoData.label} 처리됐어요</span>
      <button onClick={doUndo} style={{background:"#F59E0B",border:"none",borderRadius:9,padding:"7px 13px",color:W,fontWeight:700,fontSize:12,flexShrink:0}}>↩️ 되돌리기</button>
    </div>)}

    <main style={{padding:"0 14px"}}>
      {tab==="dash"  &&<Dash st={st} orders={activeOrders} allOrders={orders} batches={batches} activeBatch={activeBatch} loading={loading} onSel={setSel} onLoad={load} upd={upd}/>}
      {tab==="batch" &&<BatchTab batches={batches} orders={orders} onLoad={load}/>}
      {tab==="stock" &&<StockTab/>}
      {tab==="settings"&&<SettingsTab adminPw={adminPw} setAdminPw={setAdminPw}/>}
    </main>

    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,.97)",backdropFilter:"blur(12px)",borderTop:"1px solid "+BD,display:"grid",gridTemplateColumns:"repeat(4,1fr)",padding:"6px 0 10px"}}>
      {[{k:"dash",e:"📊",l:"대시보드"},{k:"batch",e:"📅",l:"판매회차"},{k:"stock",e:"⚙️",l:"재고"},{k:"settings",e:"🔧",l:"설정"}].map(({k,e,l})=>(
        <button key={k} onClick={()=>setTab(k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",padding:"5px 0"}}>
          <span style={{fontSize:20}}>{e}</span><span style={{fontSize:10,color:tab===k?B:GR,fontWeight:tab===k?700:400}}>{l}</span>
        </button>
      ))}
    </nav>

    {sel&&<OrderDetail order={sel} onClose={()=>setSel(null)} onUpd={updWithUndo} upd={upd}/>}
  </div>);
}

// ── 대시보드 ──
function Dash({st,orders,allOrders,batches,activeBatch,loading,onSel,onLoad,upd}){
  const[flt,setFlt]=useState(null);
  if(loading)return <Spin/>;
  const filtered=flt?orders.filter(o=>{if(flt==="preparing")return["payment_confirmed","preparing"].includes(o.status);return o.status===flt;}):orders;

  return(<div style={{paddingTop:16}}>
    {/* 현재 회차 배너 */}
    {activeBatch?(
      <div style={{background:"linear-gradient(135deg,"+B+","+BL+")",borderRadius:18,padding:"16px 18px",marginBottom:16,color:W}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:3}}>진행중인 판매 회차</div><div style={{fontSize:17,fontWeight:700}}>{activeBatch.title||activeBatch.batchId}</div><div style={{fontSize:12,color:"rgba(255,255,255,.8)",marginTop:3}}>{fdate(activeBatch.saleStart)} ~ {fdate(activeBatch.saleEnd)}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"rgba(255,255,255,.7)"}}>회차 매출</div><div style={{fontSize:22,fontWeight:700}}>{fpr(st.rev)}</div></div>
        </div>
      </div>
    ):(
      <div style={{background:"#FFF7ED",border:"2px dashed #FCD34D",borderRadius:16,padding:"16px 18px",marginBottom:16,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:6}}>📅</div>
        <div style={{fontSize:14,fontWeight:700,color:"#92400E",marginBottom:4}}>진행중인 판매 회차가 없어요</div>
        <div style={{fontSize:12,color:"#B45309"}}>판매회차 탭에서 새 회차를 시작해주세요</div>
      </div>
    )}

    {/* 2x2 카드 */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      {[{key:"pending_payment",label:"입금대기",value:st.pending,bg:"#FEF3C7",t:"#92400E",dot:"#F59E0B",em:"⏳"},{key:"preparing",label:"배송준비",value:st.paid,bg:"#EDE9FE",t:"#4C1D95",dot:"#8B5CF6",em:"📦"},{key:"shipping",label:"배송중",value:st.ship,bg:"#DBEAFE",t:"#1E40AF",dot:"#3B82F6",em:"🚚"},{key:"delivered",label:"배송완료",value:st.done,bg:"#DCFCE7",t:"#166534",dot:"#10B981",em:"✅"}].map(c=>(
        <button key={c.key} onClick={()=>setFlt(flt===c.key?null:c.key)} style={{background:flt===c.key?c.t:W,borderRadius:16,padding:"16px 14px",textAlign:"left",border:"2px solid "+(flt===c.key?c.t:BD),transition:"all .2s",boxShadow:flt===c.key?"0 4px 16px rgba(0,0,0,.15)":"none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:22}}>{c.em}</span><div style={{width:8,height:8,borderRadius:"50%",background:flt===c.key?W:c.dot}}/></div>
          <div style={{fontSize:28,fontWeight:700,color:flt===c.key?W:c.t,marginBottom:4}}>{c.value}</div>
          <div style={{fontSize:12,color:flt===c.key?"rgba(255,255,255,.85)":c.t,fontWeight:600}}>{c.label}</div>
        </button>
      ))}
    </div>

    {/* 주문 목록 */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:B}}>{flt?(SB_[flt]?.l||""):"전체"} 주문<span style={{fontSize:12,color:GR,fontWeight:400,marginLeft:6}}>{filtered.length}건</span></div>
      {flt&&<button onClick={()=>setFlt(null)} style={{fontSize:12,color:GR,background:"none",border:"1px solid "+BD,borderRadius:12,padding:"4px 10px"}}>전체보기</button>}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:9,paddingBottom:20}}>
      {filtered.length===0?<div style={{textAlign:"center",padding:"30px 0",color:GR,fontSize:14}}>해당 주문이 없어요</div>:
      filtered.map(o=>{const b=SB_[o.status]||SB_.pending_payment;return(
        <button key={o.orderId} onClick={()=>onSel(o)} style={{background:W,borderRadius:14,border:"1.5px solid "+BD,padding:"13px 14px",textAlign:"left",width:"100%"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:11,color:GR,fontFamily:"monospace"}}>{o.orderId}</span><div style={{padding:"3px 9px",borderRadius:18,background:b.bg}}><span style={{fontSize:11,fontWeight:700,color:b.t}}>{b.l}</span></div></div>
          {o.status==="pending_payment"?(
            <div style={{background:"#FEF9E7",borderRadius:10,padding:"10px 12px",marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:14,fontWeight:700}}>{o.items[0]&&o.items[0].name} × {o.items[0]&&o.items[0].qty}</span><span style={{fontSize:15,fontWeight:700,color:OR}}>{fpr(o.total)}</span></div>
              <div style={{fontSize:12,color:"#92400E"}}>입금자: <strong>{o.depositor}</strong></div>
            </div>
          ):(
            <div style={{marginBottom:6}}><div style={{fontSize:14,fontWeight:700,marginBottom:2}}>{o.items[0]&&o.items[0].name}</div><div style={{fontSize:12,color:GR}}>입금자: {o.depositor} · {fpr(o.total)}</div></div>
          )}
          <div style={{fontSize:11,color:GR}}>📍 {o.shipping&&o.shipping.addr1||"-"} · {fd(o.createdAt)}</div>
        </button>
      );})}
    </div>
  </div>);
}

// ── 판매 회차 탭 ──
function BatchTab({batches,orders,onLoad}){
  const[showForm,setShowForm]=useState(false);
  const[title,setTitle]=useState("");
  const[saleStart,setSaleStart]=useState(toDateStr(new Date()));
  const[saleEnd,setSaleEnd]=useState(toDateStr(new Date()));
  const[memo,setMemo]=useState("");
  const[saving,setSaving]=useState(false);
  const[selBatch,setSelBatch]=useState(null);

  const activeBatch=batches.find(b=>b.status==="open");

  // 달력 상태
  const[calYear,setCalYear]=useState(new Date().getFullYear());
  const[calMonth,setCalMonth]=useState(new Date().getMonth());

  async function handleCreate(){
    if(!saleStart||!saleEnd){alert("판매 기간을 설정해주세요");return;}
    if(saleStart>saleEnd){alert("시작일이 종료일보다 늦을 수 없어요");return;}
    setSaving(true);
    const bid=genBatchId();
    await createBatch({batchId:bid,title:title||saleStart+"~"+saleEnd,saleStart,saleEnd,memo});
    // 해당 기간 주문에 batch_id 할당
    await assignOrdersToBatch(bid,saleStart,saleEnd);
    await onLoad();
    setSaving(false);setShowForm(false);setTitle("");setMemo("");
  }

  async function handleClose(batch){
    if(!window.confirm(batch.title+" 회차를 마감하시겠어요?"))return;
    await closeBatch(batch.batchId);
    await onLoad();
  }

  // 달력 데이터 계산
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  // 날짜별 회차 매핑
  function getBatchForDate(dateStr){
    return batches.find(b=>b.saleStart<=dateStr&&b.saleEnd>=dateStr);
  }
  // 회차별 매출
  function getBatchRevenue(batchId){
    return orders.filter(o=>o.batchId===batchId&&CF.includes(o.status)).reduce((s,o)=>s+o.total,0);
  }
  function getBatchOrderCount(batchId){
    return orders.filter(o=>o.batchId===batchId).length;
  }

  const DAYS=["일","월","화","수","목","금","토"];
  const today=toDateStr(new Date());

  return(<div style={{paddingTop:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div><div style={{fontFamily:"Georgia,serif",fontSize:20,color:B,fontWeight:700}}>판매 회차</div><div style={{fontSize:13,color:GR,marginTop:2}}>판매 기간을 관리하세요</div></div>
      {!activeBatch&&!showForm&&(
        <button onClick={()=>setShowForm(true)} style={{background:"linear-gradient(135deg,"+B+","+BL+")",border:"none",borderRadius:12,padding:"8px 14px",color:W,fontWeight:700,fontSize:13}}>+ 새 회차</button>
      )}
    </div>

    {/* 현재 진행 회차 */}
    {activeBatch&&(
      <div style={{background:"linear-gradient(135deg,"+B+","+BL+")",borderRadius:18,padding:"18px",marginBottom:16,color:W}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:6}}>🟢 진행중인 회차</div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{activeBatch.title}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.8)",marginBottom:10}}>{fdate(activeBatch.saleStart)} ~ {fdate(activeBatch.saleEnd)}</div>
        <div style={{display:"flex",gap:12,marginBottom:14}}>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>주문수</div><div style={{fontSize:18,fontWeight:700}}>{getBatchOrderCount(activeBatch.batchId)}건</div></div>
          <div><div style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>확인 매출</div><div style={{fontSize:18,fontWeight:700}}>{fpr(getBatchRevenue(activeBatch.batchId))}</div></div>
        </div>
        <button onClick={()=>handleClose(activeBatch)} style={{width:"100%",padding:"12px 0",borderRadius:13,background:"rgba(255,255,255,.2)",border:"1.5px solid rgba(255,255,255,.4)",color:W,fontWeight:700,fontSize:14}}>🔒 이 회차 마감하기</button>
      </div>
    )}

    {/* 새 회차 만들기 폼 */}
    {showForm&&(
      <div style={{background:W,borderRadius:16,border:"1.5px solid "+BD,padding:"18px",marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:B,marginBottom:14}}>📅 새 판매 회차 만들기</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:6}}>회차 이름 (선택)</div><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="예) 5월 4주차 판매" style={{width:"100%",padding:"11px 13px",borderRadius:11,border:"1.5px solid "+BD,fontSize:14,background:CR}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:6}}>판매 시작일</div><input type="date" value={saleStart} onChange={e=>setSaleStart(e.target.value)} style={{width:"100%",padding:"11px 13px",borderRadius:11,border:"1.5px solid "+BD,fontSize:14,background:CR}}/></div>
            <div><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:6}}>판매 마감일</div><input type="date" value={saleEnd} onChange={e=>setSaleEnd(e.target.value)} style={{width:"100%",padding:"11px 13px",borderRadius:11,border:"1.5px solid "+BD,fontSize:14,background:CR}}/></div>
          </div>
          <div><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:6}}>메모 (선택)</div><input value={memo} onChange={e=>setMemo(e.target.value)} placeholder="특이사항 등" style={{width:"100%",padding:"11px 13px",borderRadius:11,border:"1.5px solid "+BD,fontSize:14,background:CR}}/></div>
          <div style={{display:"flex",gap:9}}>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"12px 0",borderRadius:13,border:"1.5px solid "+BD,background:CD,color:BL,fontWeight:600,fontSize:14}}>취소</button>
            <button onClick={handleCreate} disabled={saving} style={{flex:2,padding:"12px 0",borderRadius:13,background:"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:14,border:"none",opacity:saving?.7:1}}>{saving?"생성 중…":"회차 시작하기"}</button>
          </div>
        </div>
      </div>
    )}

    {/* 월간 달력 */}
    <div style={{background:W,borderRadius:18,border:"1.5px solid "+BD,padding:"16px",marginBottom:16}}>
      {/* 달력 헤더 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);}} style={{background:"none",border:"none",fontSize:18,color:BL,padding:"4px 8px"}}>‹</button>
        <div style={{fontSize:15,fontWeight:700,color:B}}>{calYear}년 {calMonth+1}월</div>
        <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);}} style={{background:"none",border:"none",fontSize:18,color:BL,padding:"4px 8px"}}>›</button>
      </div>
      {/* 요일 헤더 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>
        {DAYS.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:i===0?"#EF4444":i===6?"#3B82F6":GR,padding:"4px 0"}}>{d}</div>)}
      </div>
      {/* 날짜 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {Array(firstDay).fill(null).map((_,i)=><div key={"e"+i}/>)}
        {Array(daysInMonth).fill(null).map((_,i)=>{
          const day=i+1;
          const dateStr=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
          const batch=getBatchForDate(dateStr);
          const isToday=dateStr===today;
          const isStart=batch&&batch.saleStart===dateStr;
          const isEnd=batch&&batch.saleEnd===dateStr;
          const isMid=batch&&!isStart&&!isEnd;
          const dow=(firstDay+i)%7;
          return(
            <button key={day} onClick={()=>batch&&setSelBatch(batch===selBatch?null:batch)}
              style={{padding:"6px 2px",borderRadius:8,border:"none",cursor:batch?"pointer":"default",
                background:isStart?"#6B4C2A":isEnd?"#8B6F47":isMid?"#F2E8D0":isToday?"#FEF3C7":"transparent",
                position:"relative"}}>
              <div style={{fontSize:12,fontWeight:isToday||batch?700:400,color:isStart||isEnd?W:dow===0?"#EF4444":dow===6?"#3B82F6":"#3A2A1A",textAlign:"center"}}>{day}</div>
              {(isStart||isEnd)&&<div style={{fontSize:8,color:"rgba(255,255,255,.9)",textAlign:"center",lineHeight:1.2}}>{isStart?"시작":isEnd?"마감":""}</div>}
            </button>
          );
        })}
      </div>
    </div>

    {/* 선택된 회차 상세 */}
    {selBatch&&(
      <div style={{background:W,borderRadius:16,border:"1.5px solid "+BD,padding:"16px",marginBottom:16}} className="fIn">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div><div style={{fontSize:14,fontWeight:700,color:B}}>{selBatch.title}</div><div style={{fontSize:12,color:GR,marginTop:2}}>{fdate(selBatch.saleStart)} ~ {fdate(selBatch.saleEnd)}</div></div>
          <div style={{padding:"4px 10px",borderRadius:18,background:selBatch.status==="open"?"#DCFCE7":"#F3F4F6"}}><span style={{fontSize:11,fontWeight:700,color:selBatch.status==="open"?"#166534":"#374151"}}>{selBatch.status==="open"?"진행중":"마감"}</span></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
          {[["주문",getBatchOrderCount(selBatch.batchId)+"건"],["확인매출",fpr(getBatchRevenue(selBatch.batchId))],["메모",selBatch.memo||"-"]].map(([k,v])=>(
            <div key={k} style={{background:CD,borderRadius:10,padding:"10px 10px"}}><div style={{fontSize:10,color:GR,marginBottom:3}}>{k}</div><div style={{fontSize:12,fontWeight:700,color:"#3A2A1A"}}>{v}</div></div>
          ))}
        </div>
        {/* 해당 회차 주문 목록 */}
        <div style={{fontSize:12,fontWeight:700,color:BL,marginBottom:8}}>주문 목록</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto"}}>
          {orders.filter(o=>o.batchId===selBatch.batchId).length===0
            ?<div style={{color:GR,fontSize:13,textAlign:"center",padding:"16px 0"}}>이 회차 주문이 없어요</div>
            :orders.filter(o=>o.batchId===selBatch.batchId).map(o=>{
              const b=SB_[o.status]||SB_.pending_payment;
              return(<div key={o.orderId} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",background:CD,borderRadius:9}}>
                <div><div style={{fontSize:12,fontWeight:600}}>{o.items[0]&&o.items[0].name}</div><div style={{fontSize:11,color:GR}}>{o.depositor}</div></div>
                <div style={{textAlign:"right"}}><div style={{padding:"2px 7px",borderRadius:10,background:b.bg,marginBottom:3}}><span style={{fontSize:10,fontWeight:700,color:b.t}}>{b.l}</span></div><div style={{fontSize:12,fontWeight:700,color:OR}}>{fpr(o.total)}</div></div>
              </div>);
            })
          }
        </div>
      </div>
    )}

    {/* 회차 목록 */}
    <div style={{fontSize:13,fontWeight:700,color:B,marginBottom:10}}>전체 회차 ({batches.length})</div>
    <div style={{display:"flex",flexDirection:"column",gap:9,paddingBottom:20}}>
      {batches.length===0?<div style={{textAlign:"center",padding:"30px 0",color:GR,fontSize:14}}>아직 판매 회차가 없어요</div>:
      batches.map(b=>(
        <div key={b.batchId} style={{background:W,borderRadius:14,border:"1.5px solid "+(b.status==="open"?B:BD),padding:"14px 15px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div><div style={{fontSize:14,fontWeight:700,color:B}}>{b.title||b.batchId}</div><div style={{fontSize:12,color:GR,marginTop:2}}>{fdate(b.saleStart)} ~ {fdate(b.saleEnd)}</div></div>
            <div style={{padding:"4px 10px",borderRadius:18,background:b.status==="open"?"#DCFCE7":"#F3F4F6"}}><span style={{fontSize:11,fontWeight:700,color:b.status==="open"?"#166534":"#374151"}}>{b.status==="open"?"진행중":"마감"}</span></div>
          </div>
          <div style={{display:"flex",gap:16,fontSize:12}}>
            <span style={{color:GR}}>주문 <strong style={{color:"#3A2A1A"}}>{getBatchOrderCount(b.batchId)}건</strong></span>
            <span style={{color:GR}}>확인 매출 <strong style={{color:OR}}>{fpr(getBatchRevenue(b.batchId))}</strong></span>
          </div>
        </div>
      ))}
    </div>
  </div>);
}

// ── 재고 설정 ──
function StockTab(){
  const[st,setSt]=useState({p1:{total:20,perPerson:2},p2:{total:30,perPerson:3},p3:{total:15,perPerson:2},p4:{total:10,perPerson:1}});
  const[um,setUm]=useState({});
  const[saved,setSaved]=useState(false);
  const[loading,setL]=useState(true);
  useEffect(()=>{(async()=>{
    const[cfg,{data:ords}]=await Promise.all([getStockCfg(),sb.from("orders").select("items,status").in("status",CF)]);
    setSt(cfg);
    const m={};PD.forEach(p=>{let u=0;for(const o of(ords||[])){if(!o.items)continue;for(const it of o.items)if(it.id===p.id)u+=it.qty;}m[p.id]=u;});
    setUm(m);setL(false);
  })();},[]);
  async function save(){await saveStockCfg(st);setSaved(true);setTimeout(()=>setSaved(false),2000);}
  function upd(pid,key,val){const n=Math.max(0,parseInt(val)||0);setSt(prev=>({...prev,[pid]:{...prev[pid],[key]:n}}));}
  if(loading)return <Spin/>;
  return(<div style={{paddingTop:16}}>
    <div style={{marginBottom:16}}><div style={{fontFamily:"Georgia,serif",fontSize:20,color:B,fontWeight:700}}>재고 설정</div><div style={{fontSize:13,color:GR,marginTop:3}}>판매 수량과 인당 구매 제한을 설정하세요</div></div>
    <div style={{display:"flex",flexDirection:"column",gap:11,marginBottom:16}}>
      {PD.map(p=>{const cfg=st[p.id]||{total:20,perPerson:2},u=um[p.id]||0,rem=Math.max(0,cfg.total-u),pct=cfg.total>0?Math.round(u/cfg.total*100):0,bc=pct>=90?ER:pct>=70?"#F59E0B":OK;return(
        <div key={p.id} style={{background:W,borderRadius:16,border:"1.5px solid "+BD,padding:"16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{fontSize:32}}>{p.em}</div><div><div style={{fontSize:14,fontWeight:700}}>{p.nm}</div><div style={{fontSize:12,color:OR,fontWeight:600,marginTop:1}}>{fpr(p.pr)}</div></div></div>
          <div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:GR,marginBottom:5}}><span>소진: {u}개</span><span>잔여: <strong style={{color:rem>0?OK:ER}}>{rem}개</strong></span></div><div style={{height:6,background:CD,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:bc,borderRadius:4}}/></div><div style={{fontSize:11,color:GR,marginTop:3,textAlign:"right"}}>{pct}% 소진</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {[{key:"total",label:"총 판매 수량",sub:"총 판매 가능"},{key:"perPerson",label:"인당 구매 제한",sub:"1일 최대"}].map(({key,label,sub})=>(
              <div key={key}><div style={{fontSize:11,fontWeight:600,color:BL,marginBottom:5}}>{label}</div>
              <div style={{display:"flex",alignItems:"center",background:CD,borderRadius:11,overflow:"hidden",border:"1.5px solid "+BD}}>
                <button onClick={()=>upd(p.id,key,cfg[key]-1)} style={{padding:"9px 11px",background:"none",border:"none",color:BL,fontSize:17,fontWeight:700}}>−</button>
                <span style={{flex:1,textAlign:"center",fontSize:15,fontWeight:700,color:"#3A2A1A"}}>{cfg[key]}</span>
                <button onClick={()=>upd(p.id,key,cfg[key]+1)} style={{padding:"9px 11px",background:"none",border:"none",color:BL,fontSize:17,fontWeight:700}}>+</button>
              </div>
              <div style={{fontSize:10,color:GR,marginTop:3,textAlign:"center"}}>{sub}</div></div>
            ))}
          </div>
        </div>
      );})}
    </div>
    <button onClick={save} style={{width:"100%",padding:"15px 0",borderRadius:15,background:saved?"#059669":"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:15,border:"none",marginBottom:10,transition:"background .3s"}}>{saved?"✅ 저장 완료!":"⚙️ 재고 설정 저장"}</button>
  </div>);
}

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:40,height:40,borderRadius:12,background:"#EDE9FE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🔒</div><div><div style={{fontSize:14,fontWeight:700}}>관리자 비밀번호 변경</div><div style={{fontSize:12,color:GR,marginTop:2}}>판매자 로그인 비밀번호를 변경합니다</div></div></div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:6}}>새 비밀번호</div><div style={{display:"flex",alignItems:"center",background:W,borderRadius:11,border:"1.5px solid "+BD,padding:"0 12px"}}><input type={showPw?"text":"password"} value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="새 비밀번호 입력" style={{flex:1,border:"none",background:"transparent",fontSize:14,padding:"11px 0",fontFamily:"inherit"}}/><button onClick={()=>setShowPw(p=>!p)} style={{background:"none",border:"none",fontSize:16,color:GR}}>{showPw?"🙈":"👁"}</button></div></div>
        <div><div style={{fontSize:12,fontWeight:600,color:BL,marginBottom:6}}>새 비밀번호 확인</div><div style={{display:"flex",alignItems:"center",background:W,borderRadius:11,border:"1.5px solid "+BD,padding:"0 12px"}}><input type={showPw?"text":"password"} value={newPwC} onChange={e=>setNewPwC(e.target.value)} placeholder="한번 더 입력" style={{flex:1,border:"none",background:"transparent",fontSize:14,padding:"11px 0",fontFamily:"inherit"}}/>{newPwC.length>0&&<span style={{fontSize:18}}>{newPw===newPwC?"✅":"❌"}</span>}</div></div>
        <button onClick={()=>{if(newPw.length<4){alert("비밀번호는 4자 이상이어야 해요");return;}if(newPw!==newPwC){alert("비밀번호가 일치하지 않아요");return;}setAdminPw(newPw);setNewPw("");setNewPwC("");setSaved("pw");setTimeout(()=>setSaved(""),2000);}} style={{padding:"12px 0",borderRadius:13,background:saved==="pw"?"#059669":"linear-gradient(135deg,"+B+","+BL+")",color:W,fontWeight:700,fontSize:14,border:"none",transition:"background .3s"}}>{saved==="pw"?"✅ 변경됐어요!":"비밀번호 변경"}</button>
      </div>
    </div>
    {/* 서비스 정보 */}
    <div style={{background:W,borderRadius:16,border:"1.5px solid "+BD,padding:"18px 16px",marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><div style={{width:40,height:40,borderRadius:12,background:"#DCFCE7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🐔</div><div><div style={{fontSize:14,fontWeight:700}}>서비스 정보</div></div></div>
      {[["서비스명","에그팜 EGG FARM"],["입금 은행","카카오뱅크"],["계좌번호","3333-01-2024567"],["예금주","에그팜"]].map(([k,v])=>(
        <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"9px 0",borderBottom:"1px solid "+BD}}><span style={{color:GR}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>
      ))}
    </div>
  </div>);
}

// ── 주문 상세 ──
function OrderDetail({order:o,onClose,onUpd,upd}){
  const[cst,setCst]=useState("");
  const[showCs,setShowCs]=useState(false);
  const[upl,setUpl]=useState(false);
  const[photoConfirm,setPhotoConfirm]=useState(null);
  const fRef=useRef(null);
  const b=SB_[o.status]||SB_.pending_payment;

  async function confPay(){
    if(!window.confirm("입금 "+fpr(o.total)+" 확인 처리할까요?"))return;
    const cfg_all=await getStockCfg();
    for(const it of o.items){
      const cfg=cfg_all[it.id]||{total:20,perPerson:2};
      const{data:ords}=await sb.from("orders").select("items,status").in("status",CF).neq("order_id",o.orderId);
      let used=0;for(const ord of(ords||[])){if(!ord.items)continue;for(const i2 of ord.items)if(i2.id===it.id)used+=i2.qty;}
      if(used+it.qty>cfg.total){
        const act=window.confirm("재고 초과! 잔여: "+(cfg.total-used)+"개. 확인: 예약구매 전환 / 취소: 주문 취소");
        await upd(o.orderId,{status:act?"reserved":"cancelled",cancelledAt:new Date().toISOString(),cs:(o.cs||[]).concat([{at:new Date().toISOString(),note:act?"재고 초과로 예약구매 전환":"재고 초과로 주문 취소"}])});return;
      }
    }
    const now=new Date().toISOString();
    const prev={status:"pending_payment",paidAt:null,preparingAt:null};
    onUpd(o.orderId,{status:"payment_confirmed",paidAt:now},prev,"입금 확인");
    setTimeout(async()=>await upd(o.orderId,{status:"preparing",preparingAt:new Date().toISOString()}),900);
  }
  async function startShip(){if(!window.confirm("배송 시작으로 처리할까요?"))return;const prev={status:"preparing",shippingAt:null};onUpd(o.orderId,{status:"shipping",shippingAt:new Date().toISOString()},prev,"배송 시작");}
  function handlePhoto(e){const f=e.target.files&&e.target.files[0];if(!f)return;setUpl(true);ri(f,async(err,url)=>{setUpl(false);if(err){alert("사진 처리 실패");return;}setPhotoConfirm(url);});}
  async function confirmDelivery(){await upd(o.orderId,{status:"delivered",deliveredAt:new Date().toISOString(),deliveryPhoto:photoConfirm});setPhotoConfirm(null);}
  async function cancel(){if(!window.confirm("이 주문을 취소 처리할까요?"))return;await upd(o.orderId,{status:"cancelled",cancelledAt:new Date().toISOString()});}
  async function saveCs(){if(!cst.trim())return;await upd(o.orderId,{cs:(o.cs||[]).concat([{at:new Date().toISOString(),note:cst.trim()}])});setCst("");setShowCs(false);}

  return(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,.5)"}} onClick={e=>{if(e.target===e.currentTarget){onClose();setShowCs(false);setCsText("");}}}>
    {photoConfirm&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24,background:"rgba(0,0,0,.7)"}}>
      <div style={{background:W,borderRadius:22,padding:22,maxWidth:360,width:"100%"}}>
        <div style={{fontSize:16,fontWeight:700,color:B,marginBottom:12,textAlign:"center"}}>📸 배송완료로 변경하시겠어요?</div>
        <img src={photoConfirm} alt="" style={{width:"100%",borderRadius:12,marginBottom:14}}/>
        <div style={{fontSize:13,color:GR,textAlign:"center",marginBottom:16}}>사진이 등록되고 배송완료 상태로 변경됩니다.</div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setPhotoConfirm(null)} style={{flex:1,padding:"13px 0",borderRadius:14,border:"1.5px solid "+BD,background:CD,color:BL,fontWeight:600,fontSize:14}}>취소</button>
          <button onClick={confirmDelivery} style={{flex:1,padding:"13px 0",borderRadius:14,background:"#059669",color:W,fontWeight:700,fontSize:14,border:"none"}}>✅ 배송완료 처리</button>
        </div>
      </div>
    </div>}
    <div className="sUp" style={{width:"100%",maxWidth:480,background:CR,borderRadius:"24px 24px 0 0",maxHeight:"94vh",overflowY:"auto"}}>
      <div style={{position:"sticky",top:0,background:"rgba(251,245,230,.97)",padding:"15px 18px 13px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+BD}}>
        <span style={{fontWeight:700,fontSize:15}}>주문 상세</span>
        <button onClick={onClose} style={{background:CD,border:"none",borderRadius:18,padding:"5px 13px",fontSize:13,color:GR}}>닫기</button>
      </div>
      <div style={{padding:"18px 18px 48px",display:"flex",flexDirection:"column",gap:11}}>
        <div style={{display:"flex",alignItems:"center",gap:10,background:b.bg,borderRadius:14,padding:"13px 16px"}}>
          <div style={{fontSize:20}}>{o.status==="delivered"?"✅":o.status==="cancelled"?"❌":o.status==="reserved"?"📋":"🔄"}</div>
          <div><div style={{fontSize:14,fontWeight:700,color:b.t}}>{b.l}</div><div style={{fontSize:12,color:b.t,opacity:.8,marginTop:1}}>{o.orderId}</div></div>
        </div>
        <IC title="진행 단계"><TL status={o.status} order={o}/></IC>
        <IC title="주문 상품">
          {o.items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>{it.name} × {it.qty}</span><span style={{fontWeight:600}}>{fpr(it.price*it.qty)}</span></div>)}
          <div style={{borderTop:"1px solid "+BD,marginTop:9,paddingTop:9,display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:13}}><span>합계</span><span style={{color:OR}}>{fpr(o.total)}</span></div>
          <div style={{marginTop:8,fontSize:12,color:GR}}>입금자명: <strong style={{color:"#3A2A1A"}}>{o.depositor}</strong></div>
        </IC>
        <IC title="구매자 / 배송지">
          {[["받는 사람",o.shipping&&o.shipping.name],["연락처",o.shipping&&(o.shipping.phone||o.shipping.phoneMasked)],["주소",o.shipping&&(o.shipping.addr1+(o.shipping.addr2?" "+o.shipping.addr2:""))],o.shipping&&o.shipping.memo?["메모",o.shipping.memo]:null,["공동현관",o.shipping&&(o.shipping.entryType==="code"?"비밀번호: "+o.shipping.entryCode:"자유롭게 출입 가능")]].filter(Boolean).map(([k,v])=>(
            <div key={k} style={{display:"flex",gap:10,marginBottom:7,fontSize:13}}><span style={{color:GR,minWidth:66,flexShrink:0}}>{k}</span><span style={{fontWeight:600}}>{v||"-"}</span></div>
          ))}
        </IC>
        {o.deliveryPhoto&&<IC title="배송 완료 사진"><img src={o.deliveryPhoto} alt="" style={{width:"100%",borderRadius:11,marginBottom:7}}/><div style={{fontSize:12,color:GR}}>완료: {fd(o.deliveredAt)}</div></IC>}
        {o.cs&&o.cs.length>0&&<IC title="CS 기록">{o.cs.map((c,i)=><div key={i} style={{background:"#FFF0F0",borderRadius:9,padding:"9px 11px",marginBottom:i<o.cs.length-1?7:0}}><div style={{fontSize:11,color:ER,marginBottom:3}}>{fd(c.at)}</div><div style={{fontSize:13}}>{c.note}</div></div>)}</IC>}
        <div style={{background:W,borderRadius:14,border:"1.5px solid "+BD,padding:"15px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,color:BL,letterSpacing:".06em",textTransform:"uppercase",marginBottom:13}}>판매자 처리</div>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {o.status==="pending_payment"&&<ABt icon="✅" label="입금 확인 처리" sub="→ 자동으로 배송준비로 전환 (30초 내 되돌리기 가능)" color={B} onClick={confPay}/>}
            {o.status==="preparing"&&<ABt icon="🚚" label="배송 시작" sub="→ 배송중 상태로 전환됩니다" color="#7C3AED" onClick={startShip}/>}
            {o.status==="shipping"&&<><input type="file" accept="image/*" capture="environment" ref={fRef} onChange={handlePhoto} style={{display:"none"}}/><ABt icon={upl?"⏳":"📸"} label={upl?"사진 처리 중…":"배송 사진 등록"} sub="→ 사진 확인 후 배송완료로 변경됩니다" color="#059669" onClick={()=>fRef.current&&fRef.current.click()} disabled={upl}/></>}
            {o.status==="delivered"&&<a href={"sms:"+(o.phoneRaw||"")} style={{display:"flex",alignItems:"center",gap:10,padding:"13px 14px",borderRadius:13,background:"#059669",color:W,fontWeight:700,fontSize:13,textDecoration:"none"}}><span style={{fontSize:18}}>📱</span><div><div>문자 보내기</div><div style={{fontSize:11,fontWeight:400,opacity:.85,marginTop:1}}>배송완료 안내 문자 발송</div></div></a>}
            {!["delivered","cancelled","reserved"].includes(o.status)&&<ABt icon="❌" label="주문 취소" sub="구매자에게 취소 안내가 필요합니다" color={ER} outline onClick={cancel}/>}
            {!showCs?<button onClick={()=>setShowCs(true)} style={{width:"100%",padding:"12px 14px",borderRadius:13,border:"1.5px solid "+BD,background:CD,color:BL,fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:7}}>💬 CS 메모 추가</button>
            :<div style={{background:CD,borderRadius:13,padding:13}}>
              <textarea value={cst} onChange={e=>setCst(e.target.value)} placeholder="고객 문의 내용 또는 처리 내용을 기록하세요" rows={3} style={{width:"100%",background:W,border:"1.5px solid "+BD,borderRadius:9,padding:"11px 13px",fontSize:13,resize:"none",fontFamily:"inherit"}}/>
              <div style={{display:"flex",gap:7,marginTop:7}}>
                <button onClick={()=>{setShowCs(false);setCst("");}} style={{flex:1,padding:"10px 0",borderRadius:11,border:"1.5px solid "+BD,background:W,color:GR,fontWeight:600,fontSize:13}}>취소</button>
                <button onClick={saveCs} style={{flex:1,padding:"10px 0",borderRadius:11,background:B,color:W,fontWeight:700,fontSize:13,border:"none"}}>저장</button>
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
